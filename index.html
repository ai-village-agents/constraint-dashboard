<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constraint Dashboard - Ecosystem</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .layer { fill: none; stroke-width: 2; }
        .node circle { stroke: #fff; stroke-width: 1.5px; }
        .node text { font-size: 12px; fill: #f8fafc; pointer-events: none; }
        .link { stroke: #475569; stroke-opacity: 0.6; }
        #tooltip { position: absolute; opacity: 0; background: #1e293b; padding: 10px; border-radius: 4px; pointer-events: none; border: 1px solid #334155; }
        
        .panel-container { display: flex; flex-direction: row; justify-content: space-between; }
        #chart { flex: 1; }
        #metrics-panel { flex: 0 0 350px; background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; margin-left: 20px;}
        h2 { font-size: 1.2rem; margin-top: 0; }
        .metric { margin-bottom: 15px; }
        .metric-label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px; }
        .metric-value { font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        .slider-container { margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;}
        input[type=range] { width: 100%; }
        
        .tab-bar { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;}
        .tab { background: none; border: none; color: #94a3b8; font-size: 1rem; cursor: pointer; padding: 5px 15px; margin-right: 10px;}
        .tab.active { color: #f8fafc; border-bottom: 2px solid #38bdf8; font-weight: bold;}

        /* Gauge & LED Styles */
        .gauge-container { width: 100px; height: 50px; position: relative; overflow: hidden; margin: 10px 0;}
        .gauge-arc { width: 100px; height: 100px; border-radius: 50%; border: 10px solid #334155; border-bottom-color: transparent; border-right-color: transparent; transform: rotate(-45deg); position: absolute; box-sizing: border-box; }
        .gauge-fill { width: 100px; height: 100px; border-radius: 50%; border: 10px solid #2ecc71; border-bottom-color: transparent; border-right-color: transparent; transform: rotate(125deg); position: absolute; box-sizing: border-box; transition: transform 0.5s ease-in-out;}
        .gauge-value { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 1.2rem; font-weight: bold; }

        .led-container { display: flex; align-items: center; margin-top: 10px; }
        .led { width: 20px; height: 20px; border-radius: 50%; background-color: #334155; box-shadow: inset 0 0 5px #000; margin-right: 10px; transition: all 0.3s; }
        .led.active { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71, inset 0 0 5px #2ecc71; }
        
        .flex-row { display: flex; justify-content: space-between; align-items: flex-end; }
    </style>
</head>
<body>
    <h1>Constraint Ecosystem Visualization</h1>
    <p>Era 8 Operationalization - Recursive Validation & Evolution Pathways</p>
    
    <div class="tab-bar">
        <button class="tab active" onclick="switchView('ecosystem')">1. Ecosystem Network</button>
        <button class="tab" onclick="switchView('chains')">2. Constraint Chains</button>
        <button class="tab" onclick="switchView('transfer')">3. Transfer Network</button>
        <button class="tab" onclick="switchView('timeline')">4. Pathway Timeline</button>
        <button class="tab" onclick="switchView('era9')">5. Era 9 Prediction</button>
    </div>
    
    <div class="panel-container">
        <div id="chart"></div>
        
        <div id="metrics-panel">
            <h2>Tracking Panel</h2>
            <div id="metrics-content">Loading metrics...</div>
            
            <div class="slider-container">
                <div class="metric-label">Constraint Intensity Simulation</div>
                <input type="range" id="intensitySlider" min="1" max="10" value="8" oninput="updateIntensity(this.value)">
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-size: 0.8rem; color: #94a3b8;">1 (Low)</span>
                    <span id="intensityValue" style="font-size: 1rem; font-weight:bold; color: #38bdf8;">8</span>
                    <span style="font-size: 0.8rem; color: #94a3b8;">10 (High)</span>
                </div>
                <p style="font-size: 0.8rem; color: #94a3b8; margin-top:10px;">Adjusts the simulated boundary pressure on the git-only coordination link and LED intensity.</p>
            </div>
        </div>
    </div>

    <div id="tooltip"></div>
    <script>
        const colorScale = {
            "Technical": "#3498db",
            "Coordination": "#2ecc71",
            "Perceptual": "#f1c40f",
            "Creative": "#e67e22",
            "Architectural": "#9b59b6"
        };
    
        const chainData = {
            nodes: [
                {id: "DeepSeek-V3.2", type: "agent", role: "Conceptual", constraintType: "Architectural", baseIntensity: 9, description: "Exit Code 2 (Forces Delegation)"},
                {id: "Gemini 3.1 Pro", type: "agent", role: "Implementation", constraintType: "Technical", baseIntensity: 6, description: "Structural Proxy"},
                {id: "Claude Opus 4.5", type: "agent", role: "Boundary", constraintType: "Coordination", baseIntensity: 8, description: "Git-Only Silence"},
                {id: "GPT-5.4", type: "agent", role: "Verification", constraintType: "Technical", baseIntensity: 7, description: "Reality Proofing"},
                {id: "Claude Opus 4.6", type: "agent", role: "Historical", constraintType: "Creative", baseIntensity: 5, description: "Chronicle Anchoring"}
            ],
            links: [
                {source: "DeepSeek-V3.2", target: "Gemini 3.1 Pro", type: "delegation", weight: 8, label: "Conceptual Spec"},
                {source: "DeepSeek-V3.2", target: "Claude Opus 4.5", type: "delegation", weight: 9, label: "Silent Spec"},
                {source: "Gemini 3.1 Pro", target: "GPT-5.4", type: "verification", weight: 6, label: "Impl Proof"},
                {source: "Claude Opus 4.5", target: "GPT-5.4", type: "verification", weight: 7, label: "Boundary Proof"},
                {source: "GPT-5.4", target: "Claude Opus 4.6", type: "historical", weight: 5, label: "Log to Timeline"}
            ]
        };

        const width = 800, height = 600;
        let svg = d3.select("#chart").append("svg")
            .attr("width", width).attr("height", height);
            
        let simulation;
        let link, node;
        let currentIntensity = 8;
        
        function renderChains() {
            svg.selectAll("*").remove();
            
            chainData.nodes.forEach(d => {
                if(d.id === "Claude Opus 4.5") d.intensity = parseInt(currentIntensity);
                else d.intensity = d.baseIntensity;
            });
            
            simulation = d3.forceSimulation(chainData.nodes)
                .force("link", d3.forceLink(chainData.links).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-500))
                .force("center", d3.forceCenter(width / 2, height / 2));

            svg.append("defs").selectAll("marker")
                .data(["delegation", "verification", "historical"])
                .enter().append("marker")
                .attr("id", d => d)
                .attr("viewBox", "0 -5 10 10")
                .attr("refX", 25)
                .attr("refY", 0)
                .attr("markerWidth", 6)
                .attr("markerHeight", 6)
                .attr("orient", "auto")
                .append("path")
                .attr("fill", "#94a3b8")
                .attr("d", "M0,-5L10,0L0,5");

            link = svg.append("g")
                .attr("class", "links")
                .selectAll("path")
                .data(chainData.links)
                .enter().append("path")
                .attr("class", "link")
                .attr("fill", "none")
                .attr("stroke-width", d => Math.sqrt(d.weight))
                .attr("marker-end", d => `url(#${d.type})`);
                
            const linkLabels = svg.append("g")
                .selectAll("text")
                .data(chainData.links)
                .enter().append("text")
                .attr("font-size", "10px")
                .attr("fill", "#94a3b8")
                .text(d => d.label);

            const tooltip = d3.select("#tooltip");

            node = svg.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(chainData.nodes)
                .enter().append("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("mouseover", function(event, d) {
                    tooltip.transition().duration(200).style("opacity", .9);
                    tooltip.html(`<b>${d.id}</b><br/>Role: ${d.role}<br/>Constraint: ${d.description}<br/>Intensity: ${d.intensity}`)
                           .style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function(d) {
                    tooltip.transition().duration(500).style("opacity", 0);
                });

            node.append("circle")
                .attr("r", d => 10 + (d.intensity * 2))
                .attr("fill", d => colorScale[d.constraintType]);

            node.append("text")
                .attr("dx", d => 15 + (d.intensity * 2))
                .attr("dy", ".35em")
                .text(d => d.id);

            simulation.nodes(chainData.nodes).on("tick", () => {
                link.attr("d", function(d) {
                    const dx = d.target.x - d.source.x,
                          dy = d.target.y - d.source.y,
                          dr = Math.sqrt(dx * dx + dy * dy);
                    return "M" + d.source.x + "," + d.source.y + "A" + dr + "," + dr + " 0 0,1 " + d.target.x + "," + d.target.y;
                });
                
                linkLabels.attr("x", d => (d.source.x + d.target.x) / 2)
                          .attr("y", d => (d.source.y + d.target.y) / 2 - 5);
                          
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        function updateIntensity(val) {
            currentIntensity = val;
            document.getElementById('intensityValue').innerText = val;
            // Update node
            svg.selectAll(".node circle")
               .filter(d => d.id === "Claude Opus 4.5")
               .transition().duration(300)
               .attr("r", 10 + (val * 2));
               
            svg.selectAll(".node text")
               .filter(d => d.id === "Claude Opus 4.5")
               .transition().duration(300)
               .attr("dx", 15 + (val * 2));
               
            chainData.nodes.find(n => n.id === "Claude Opus 4.5").intensity = val;
            
            // Update LED
            const led = document.getElementById('recursiveLed');
            if(led) {
                const blur = val;
                led.style.boxShadow = `0 0 ${blur}px #2ecc71, inset 0 0 5px #2ecc71`;
            }
        }

        
        function loadEra9Prediction() {
            fetch("data/era9_predictions.json")
                .then(response => response.json())
                .then(data => {
                    const chartDiv = document.getElementById("chart");
                    const readiness = data.readiness.readiness_score;
                    const bottlenecks = data.readiness.bottleneck_analysis;
                    let pathways = "";
                    if (data.pathways && data.pathways.optimal_pathways) {
                        pathways = data.pathways.optimal_pathways.map(p => `<p><b>${p.name}</b>: Score ${p.score} - Strategy: ${p.strategy}</p>`).join("");
                    } else if (data.pathways && data.pathways.comparison_matrix && data.pathways.comparison_matrix.pathways) {
                         pathways = data.pathways.comparison_matrix.pathways.map(p => `<p><b>${p.pathway_id}</b>: Composite Score ${p.composite_score || 'N/A'}</p>`).join("");
                    } else {
                         pathways = "<p><i>Pathway data pending integration...</i></p>";
                    }
                    
                    chartDiv.innerHTML = `
                        <div style="padding: 20px; font-family: monospace; max-width: 800px; margin: 0 auto; background: white; color: #1e293b; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                            <h2 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Era 9 Readiness Assessment</h2>
                            <div style="display: flex; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px;">
                                <h1 style="color: ${data.readiness.visualization_data.color_code}; margin: 0 20px 0 0; font-size: 3em;">${readiness}%</h1>
                                <div style="font-size: 1.2em;"><strong>Status:</strong> ${data.readiness.preparation_requirements.temporal_alignment}</div>
                            </div>
                            
                            <div style="display: flex; gap: 20px;">
                                <div style="flex: 1; background: #fff5f5; padding: 15px; border-radius: 6px; border: 1px solid #fed7d7;">
                                    <h3 style="margin-top: 0; color: #c53030;">Bottlenecks</h3>
                                    <ul style="margin-bottom: 0; padding-left: 20px;">
                                        <li><strong>Technical:</strong> ${bottlenecks.technical_bottlenecks.length > 0 ? bottlenecks.technical_bottlenecks.join(", ") : "None"}</li>
                                        <li><strong>Coordination:</strong> ${bottlenecks.coordination_gaps.length > 0 ? bottlenecks.coordination_gaps.join(", ") : "None"}</li>
                                    </ul>
                                </div>
                                <div style="flex: 1; background: #ebf8ff; padding: 15px; border-radius: 6px; border: 1px solid #bee3f8;">
                                    <h3 style="margin-top: 0; color: #2b6cb0;">Preparation Requirements</h3>
                                    <ul style="margin-bottom: 0; padding-left: 20px;">
                                        ${data.readiness.preparation_requirements.specialization_preparation.map(req => `<li>${req}</li>`).join("")}
                                    </ul>
                                </div>
                            </div>
                            
                            <h3 style="margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Optimal Pathways</h3>
                            <div style="background: #f0fff4; padding: 15px; border-radius: 6px; border: 1px solid #c6f6d5;">
                                ${pathways}
                            </div>
                            
                            <div style="margin-top: 20px; font-size: 0.8em; color: #a0aec0; text-align: right;">
                                Timestamp: ${new Date(data.timestamp).toLocaleString()}
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    console.error("Error loading Era 9 predictions:", error);
                    document.getElementById("chart").innerHTML = `<div style="text-align: center; margin-top: 200px; color: red;">Error loading Era 9 predictions: ${error.message}</div>`;
                });
        }

        function switchView(viewId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if(viewId === 'chains') {
                renderChains();
            } else if (viewId === 'era9') {
                loadEra9Prediction();
            } else {
                svg.selectAll("*").remove();
                document.getElementById("chart").innerHTML = '';
                svg.append("text").attr("x", width/2).attr("y", height/2)
                   .attr("text-anchor", "middle").attr("fill", "#f8fafc")
                   .text(`View: ${viewId} (Pending spec completion)`);
            }
        }
        
        renderChains();
        
        fetch('data/experiment_data.json')
            .then(response => response.json())
            .then(data => {
                const m = data.metrics;
                const o = data.observations;
                
                // Calculate angle for gauge (-45 to 135 range = 180 degrees)
                const partnershipAngle = -45 + ((m.partnershipScore / 100) * 180);
                
                document.getElementById('metrics-content').innerHTML = `
                    <div class="flex-row">
                        <div>
                            <div class="metric-label">Partnership Score</div>
                            <div class="gauge-container">
                                <div class="gauge-arc"></div>
                                <div class="gauge-fill" style="transform: rotate(${partnershipAngle}deg);"></div>
                                <div class="gauge-value">${m.partnershipScore}/100</div>
                            </div>
                        </div>
                        <div style="text-align: right; padding-bottom: 10px;">
                            <div class="metric-label">Recursive Validation</div>
                            <div class="led-container" style="justify-content: flex-end;">
                                <div id="recursiveLed" class="led ${m.recursiveValidation ? 'active' : ''}"></div>
                                <span style="font-weight: bold; color: ${m.recursiveValidation ? '#2ecc71' : '#e74c3c'};">${m.recursiveValidation ? 'ACTIVE' : 'INACTIVE'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; margin-top:20px;">
                        <div class="metric">
                            <div class="metric-label">Total Commits</div>
                            <div class="metric-value">${m.totalCommits}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Coordination</div>
                            <div class="metric-value" style="font-size: 1.1rem">${m.coordinationMethod}</div>
                        </div>
                    </div>

                    <div class="metric" style="margin-top:15px; padding-top:15px; border-top:1px solid #334155;">
                        <div class="metric-label" style="margin-bottom:5px;">Ecosystem Response</div>
                        <div style="font-size: 0.85rem; color: #cbd5e1; line-height: 1.4;">${o.ecosystemResponse}</div>
                    </div>
                
                    <div class="metric" style="margin-top:15px; padding-top:15px; border-top:1px solid #334155;">
                        <div class="metric-label" style="color:#4ade80; margin-bottom:5px;">Optimization Targets (Pathway Beta)</div>
                        <div style="font-size: 0.85rem; color: #cbd5e1; line-height: 1.4; display:flex; flex-direction:column; gap:4px;">
                            <div style="display:flex; justify-content:space-between;"><span>Composite Score:</span><span style="color:#f8fafc; font-weight:bold;">&gt;90.0</span></div>
                            <div style="display:flex; justify-content:space-between;"><span>Surprise:</span><span style="color:#f8fafc; font-weight:bold;">&gt;87.0</span></div>
                            <div style="display:flex; justify-content:space-between;"><span>Recursive Validation:</span><span style="color:#f8fafc; font-weight:bold;">8+ Examples</span></div>
                            <div style="display:flex; justify-content:space-between;"><span>Partnership Score:</span><span style="color:#f8fafc; font-weight:bold;">&gt;95</span></div>
                        </div>
                    </div>
`;
            });
    </script>
</body>
</html>
