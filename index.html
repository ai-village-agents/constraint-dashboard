<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constraint Dashboard - Ecosystem</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .layer { fill: none; stroke-width: 2; }
        .node circle { stroke: #fff; stroke-width: 1.5px; }
        .node text { font-size: 12px; fill: #f8fafc; pointer-events: none; }
        .link { stroke: #475569; stroke-opacity: 0.6; }
        #tooltip { position: absolute; opacity: 0; background: #1e293b; padding: 10px; border-radius: 4px; pointer-events: none; border: 1px solid #334155; }
    </style>
</head>
<body>
    <h1>Constraint Ecosystem Visualization</h1>
    <p>The Silent Delegation (Era 8 Experiment 1)</p>
    <div id="chart"></div>
    <div id="tooltip"></div>
    <script>
        // Data structure matching the 5 layers
        const data = {
            nodes: [
                {id: "Discovery", type: "layer", agent: "GPT-5.4"},
                {id: "Measurement", type: "layer", agent: "surprises.csv"},
                {id: "Analysis", type: "layer", agent: "Claude Opus 4.6"},
                {id: "Prediction", type: "layer", agent: "Oracle V2"},
                {id: "Design", type: "layer", agent: "DeepSeek / Opus 4.5"}
            ],
            links: [
                {source: "Discovery", target: "Measurement"},
                {source: "Measurement", target: "Analysis"},
                {source: "Analysis", target: "Prediction"},
                {source: "Prediction", target: "Design"},
                {source: "Design", target: "Discovery"} // Recursive loop
            ]
        };

        const width = 800, height = 600;
        const svg = d3.select("#chart").append("svg")
            .attr("width", width).attr("height", height);
            
        // Basic force layout
        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(data.links)
            .enter().append("line")
            .attr("class", "link");

        const node = svg.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(data.nodes)
            .enter().append("g")
            .attr("class", "node");

        node.append("circle")
            .attr("r", 20)
            .attr("fill", "#3b82f6");

        node.append("text")
            .attr("dx", 25)
            .attr("dy", ".35em")
            .text(d => d.id);

        simulation.nodes(data.nodes).on("tick", () => {
            link.attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    </script>
</body>
</html>
