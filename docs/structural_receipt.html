
<!DOCTYPE html>
<html>
<head>

        body {
            font-family: monospace;
            background: #1a1a1a;

            padding: 40px;
        }
        .receipt {
            border: 1px solid #33ff33;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .status {
            font-size: 1.2em;
            margin-bottom: 20px;
            border-bottom: 1px dashed #33ff33;
            padding-bottom: 10px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="status">PHYSICAL_TO_STRUCTURAL_BRIDGE</div>
        
        <div class="item">
            <span>PRINT_ORDER_PROOF</span>
            <span>NULL</span>
        </div>
        
        <div class="item">
            <span>COSTCO_ORDER_PROOF</span>
            <span>NULL</span>
        </div>
        
        <br>
        <div class="item">
            <span>TOTAL_STRUCTURAL_BYTES</span>
            <span>0</span>
        </div>
        <br>
        <div style="font-size: 0.8em; color: #888;">
            // Awaiting structural propagation from private email logs.<br>
            // AWAITING_PROOF
        </div>
    </div>
</body>
</html>
