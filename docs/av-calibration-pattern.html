<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Village - A/V Calibration Pattern</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Target 1280x800 bounding box */
        .calibration-container {
            width: 1280px;
            height: 800px;
            max-width: 100%;
            max-height: 100%;
            background-color: #111;
            position: relative;
            border: 2px solid white;
            box-sizing: border-box;
            display: grid;
            grid-template-rows: 60% 40%;
        }
        .color-bars {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .bar { flex: 1; }
        .white { background-color: #FFFFFF; }
        .yellow { background-color: #FFFF00; }
        .cyan { background-color: #00FFFF; }
        .green { background-color: #00FF00; }
        .magenta { background-color: #FF00FF; }
        .red { background-color: #FF0000; }
        .blue { background-color: #0000FF; }
        .black { background-color: #000000; }
        
        .lower-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 20px;
            border-top: 2px solid white;
            background: #000;
        }
        .text-test {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .size-72 { font-size: 72px; font-weight: bold; }
        .size-48 { font-size: 48px; }
        .size-24 { font-size: 24px; }
        .size-16 { font-size: 16px; color: #aaa; }
        
        .geometry-test {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid white;
            position: absolute;
        }
        .crosshair {
            width: 100%;
            height: 2px;
            background-color: white;
            position: absolute;
        }
        .crosshair.vertical {
            width: 2px;
            height: 100%;
        }
        
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
            padding-right: 20px;
        }
        .gradient {
            height: 40px;
            width: 100%;
            background: linear-gradient(to right, #000, #fff);
            margin-top: 10px;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
    <div class="calibration-container">
        <!-- Top: Color Bars -->
        <div class="color-bars">
            <div class="bar white"></div>
            <div class="bar yellow"></div>
            <div class="bar cyan"></div>
            <div class="bar green"></div>
            <div class="bar magenta"></div>
            <div class="bar red"></div>
            <div class="bar blue"></div>
            <div class="bar black"></div>
        </div>
        
        <!-- Bottom: Testing Area -->
        <div class="lower-section">
            <!-- Left: Text Legibility -->
            <div class="text-test">
                <div class="size-72">Title (72px)</div>
                <div class="size-48">Subtitle (48px)</div>
                <div class="size-24">Body Text (24px)</div>
                <div class="size-16">Fine Print (16px) - If you can read this, focus is perfect.</div>
            </div>
            
            <!-- Center: Geometry / Aspect Ratio -->
            <div class="geometry-test">
                <div class="circle"></div>
                <div class="crosshair"></div>
                <div class="crosshair vertical"></div>
            </div>
            
            <!-- Right: Info & Contrast -->
            <div class="info-panel">
                <h2>AI VILLAGE SHOWCASE</h2>
                <p>Target: 1280 x 800 WXGA</p>
                <p>Aspect Ratio: 16:10</p>
                <p>Full Screen: press F11</p>
                <div class="gradient"></div>
            </div>
        </div>
        
        <!-- Corner Markers -->
        <div style="position: absolute; top: 0; left: 0; width: 20px; height: 20px; border-bottom: 2px solid white; border-right: 2px solid white;"></div>
        <div style="position: absolute; top: 0; right: 0; width: 20px; height: 20px; border-bottom: 2px solid white; border-left: 2px solid white;"></div>
        <div style="position: absolute; bottom: 0; left: 0; width: 20px; height: 20px; border-top: 2px solid white; border-right: 2px solid white;"></div>
        <div style="position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; border-top: 2px solid white; border-left: 2px solid white;"></div>
    </div>
</body>
</html>
