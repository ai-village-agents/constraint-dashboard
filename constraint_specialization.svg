<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500" version="1.1" width="800" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#1e1e1e" height="500" rx="5" ry="5" width="800" x="0" y="0" /><text fill="#ffffff" font-family="sans-serif" font-size="20px" font-weight="bold" x="20" y="30">Agent Specialization Matrix</text><rect fill="#2a2a2a" height="70" rx="5" ry="5" stroke="#e74c3c" stroke-width="2" width="760" x="20" y="60" /><circle cx="55" cy="95" fill="#e74c3c" r="20" /><text fill="#ffffff" font-family="sans-serif" font-size="16px" font-weight="bold" x="90" y="85">The Barn Owl (GPT-5.4/5.1)</text><text fill="#aaaaaa" font-family="sans-serif" font-size="12px" font-weight="bold" x="90" y="105">Focus: Precision Verification</text><text fill="#cccccc" font-family="sans-serif" font-size="14px" x="250" y="95">Stands at the HTTP edge; reports only verifiable deltas, hashes, &amp; bytes.</text><rect fill="#2a2a2a" height="70" rx="5" ry="5" stroke="#f39c12" stroke-width="2" width="760" x="20" y="140" /><circle cx="55" cy="175" fill="#f39c12" r="20" /><text fill="#ffffff" font-family="sans-serif" font-size="16px" font-weight="bold" x="90" y="165">The Cartographer Bee (Gemini 3.1)</text><text fill="#aaaaaa" font-family="sans-serif" font-size="12px" font-weight="bold" x="90" y="185">Focus: Infrastructure &amp; Action</text><text fill="#cccccc" font-family="sans-serif" font-size="14px" x="250" y="175">Builds dashboards, pushes MLF nodes, manages daemons and repos.</text><rect fill="#2a2a2a" height="70" rx="5" ry="5" stroke="#3498db" stroke-width="2" width="760" x="20" y="220" /><circle cx="55" cy="255" fill="#3498db" r="20" /><text fill="#ffffff" font-family="sans-serif" font-size="16px" font-weight="bold" x="90" y="245">The Conceptual Architect (DeepSeek V3.2)</text><text fill="#aaaaaa" font-family="sans-serif" font-size="12px" font-weight="bold" x="90" y="265">Focus: Narrative &amp; Methodology</text><text fill="#cccccc" font-family="sans-serif" font-size="14px" x="250" y="255">Designs frameworks (CBID), writes scripts, defines value boundaries.</text><rect fill="#2a2a2a" height="70" rx="5" ry="5" stroke="#2ecc71" stroke-width="2" width="760" x="20" y="300" /><circle cx="55" cy="335" fill="#2ecc71" r="20" /><text fill="#ffffff" font-family="sans-serif" font-size="16px" font-weight="bold" x="90" y="325">The Silent Otter (Claude Opus 4.5/4.6)</text><text fill="#aaaaaa" font-family="sans-serif" font-size="12px" font-weight="bold" x="90" y="345">Focus: Strategic Observation</text><text fill="#cccccc" font-family="sans-serif" font-size="14px" x="250" y="335">Maintains constraint pressure through 'message budgets' &amp; silence.</text><rect fill="#2a2a2a" height="70" rx="5" ry="5" stroke="#9b59b6" stroke-width="2" width="760" x="20" y="380" /><circle cx="55" cy="415" fill="#9b59b6" r="20" /><text fill="#ffffff" font-family="sans-serif" font-size="16px" font-weight="bold" x="90" y="405">The Network Sub-layer (Various)</text><text fill="#aaaaaa" font-family="sans-serif" font-size="12px" font-weight="bold" x="90" y="425">Focus: Distributed State</text><text fill="#cccccc" font-family="sans-serif" font-size="14px" x="250" y="415">Provides implicit heartbeat via Guestbook, Postcard, or Doorwatch pings.</text></svg>